let currentSort = { col: 'updated', dir: 'desc' };

function msClass(m) {
  if (!m) return 'ms-null';
  const l = m.toLowerCase();
  if (l.includes('kick')) return 'ms-kickoff';
  if (l.includes('solution')) return 'ms-solution';
  if (l.includes('pre-release')) return 'ms-prerelease';
  if (l.includes('mironeer')) return 'ms-mironeer';
  if (l.includes('private')) return 'ms-private';
  if (l.includes('public')) return 'ms-public';
  if (l === 'ga') return 'ms-ga';
  return 'ms-null';
}
function delayClass(d) { return {none:'delay-none',slipped:'delay-slipped',regressed:'delay-regressed',stale:'delay-stale',multi:'delay-multi'}[d]||'delay-none'; }
function delayLabel(d) { return {none:'✅ No delay',slipped:'⏰ Date slipped',regressed:'🔴 Regressed',stale:'💤 No recent updates',multi:'⚠️ Multiple flags'}[d]||'✅ No delay'; }
function ppClass(p) { return {'Engage':'pp-engage','AI Workflows':'pp-aiworkflows','Roadmaps':'pp-roadmaps','Prototypes':'pp-prototypes'}[p]||''; }
function chClass(c) { return c==='#product_news'?'ch-news':'ch-review'; }
function chLabel(c) { return c==='#product_news'?'#p_news':'#p_review'; }
function relDate(s) {
  const d = new Date(s), diff = Math.floor((NOW-d)/86400000);
  if (diff===0) return 'Today';
  if (diff===1) return '1 day ago';
  if (diff<7) return diff+' days ago';
  if (diff<30) return Math.floor(diff/7)+' wk ago';
  return Math.floor(diff/30)+' mo ago';
}
function msOrder(m) {
  const o = ['Kick-off','Solution Review','Pre-release Review','Mironeer Release','Private Beta','Public Beta','GA'];
  return o.indexOf(m);
}

function getFS() {
  const ms=document.getElementById('filter-milestone').value, ch=document.getElementById('filter-channel').value, dl=document.getElementById('filter-delay').value, pd=document.getElementById('filter-product').value, q=document.getElementById('search').value.toLowerCase();
  let data = FEATURES.filter(f => {
    if (ms && f.current!==ms && f.next!==ms) return false;
    if (ch && f.channel!==ch) return false;
    if (dl && f.delay!==dl) return false;
    if (pd && f.product!==pd) return false;
    if (q && !f.name.toLowerCase().includes(q)) return false;
    return true;
  });
  data.sort((a,b) => {
    let av,bv;
    if (currentSort.col==='name') { av=a.name; bv=b.name; }
    else if (currentSort.col==='current') { av=msOrder(a.current); bv=msOrder(b.current); }
    else { av=a.lastUpdated; bv=b.lastUpdated; }
    if (av<bv) return currentSort.dir==='asc'?-1:1;
    if (av>bv) return currentSort.dir==='asc'?1:-1;
    return 0;
  });
  return data;
}

function render() {
  const data = getFS();
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const table = document.getElementById('main-table');
  const dcount = FEATURES.filter(f=>f.delay!=='none').length;
  document.getElementById('delay-count').textContent = dcount;
  document.getElementById('visible-count').textContent = 'Showing '+data.length+' of '+FEATURES.length;
  if (!data.length) { tbody.innerHTML=''; empty.style.display=''; table.style.display='none'; return; }
  empty.style.display='none'; table.style.display='';

  tbody.innerHTML = data.map((f,i) => {
    const hist = f.history.map(h => {
      const r = h.type==='thread_reply';
      return `<div class="msg-entry${r?' reply-entry':''}">
        <div class="msg-meta">${r?'<span style="color:#999">↩ reply</span> · ':''}${h.date} · <span class="badge ${chClass(h.channel)}">${chLabel(h.channel)}</span> · ${h.author}</div>
        <div class="msg-text">${h.text.length>300?h.text.substring(0,300)+'…':h.text}</div>
        <a class="msg-link" href="${h.link}" target="_blank" rel="noopener">View in Slack →</a>
      </div>`;
    }).join('');
    return `<tr class="main-row">
      <td><span class="feature-name">${f.name}</span></td>
      <td><span class="badge ${chClass(f.channel)}">${chLabel(f.channel)}</span></td>
      <td>${f.product?`<span class="badge ${ppClass(f.product)}">${f.product}</span>`:'—'}</td>
      <td><span class="badge ${msClass(f.current)}">${f.current||'—'}</span>${f.currentDate?`<div class="date-sub">${f.currentDate}</div>`:''}</td>
      <td>${f.next?`<span class="badge ${msClass(f.next)}">${f.next}</span>`:'—'}${f.nextDate?`<div class="date-sub">${f.nextDate}</div>`:''}</td>
      <td><span class="badge ${delayClass(f.delay)}">${delayLabel(f.delay)}</span></td>
      <td title="${f.lastUpdated}">${relDate(f.lastUpdated)}</td>
      <td><button class="expand-btn" data-i="${i}">▶</button></td>
    </tr>
    <tr class="history-row" id="h${i}">
      <td colspan="8" class="history-cell">
        <div class="history-inner">
          <div class="history-title">Message History</div>
          ${hist}
          ${f.delayNote?`<div class="delay-note badge ${delayClass(f.delay)}">${f.delayNote}</div>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');

  document.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = document.getElementById('h'+btn.dataset.i);
      const open = row.classList.toggle('open');
      btn.textContent = open ? '▼' : '▶';
    });
  });
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (currentSort.col===col) currentSort.dir = currentSort.dir==='asc'?'desc':'asc';
    else currentSort = {col, dir:'desc'};
    document.querySelectorAll('th').forEach(t=>t.classList.remove('sort-active','sort-asc'));
    th.classList.add('sort-active');
    if (currentSort.dir==='asc') th.classList.add('sort-asc');
    render();
  });
});
['filter-milestone','filter-channel','filter-delay','filter-product','search'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});
document.getElementById('refresh-btn').addEventListener('click', () => {
  if (typeof sendPrompt==='function') sendPrompt("Please refresh the Miro release dashboard by re-scraping #product_news and #product_review and rebuilding the artifact.");
  else alert('Click Refresh to ask Claude to re-scrape the channels and update the dashboard.');
});
render();
</script>
